<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心滴・教練</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap');
    
    body {
      margin: 0; padding: 0; background: linear-gradient(#e8f0e0, #f8f5f0);
      font-family: 'LXGW WenKai TC', system-ui; height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    
    .app-screen {
      width: 100%; max-width: 420px; height: 100vh; max-height: 780px;
      background: white; box-shadow: 0 0 30px rgba(0,0,0,0.15);
      border-radius: 40px; overflow: hidden; position: relative;
    }
    
    .header {
      background: linear-gradient(135deg, #5C7849, #8AA67A);
      color: white; padding: 20px 20px 15px; text-align: center;
      position: relative;
    }
    
    .badge {
      background: #FFD700; color: #333; padding: 6px 18px; border-radius: 30px;
      font-size: 15px; font-weight: bold; display: inline-block; margin-bottom: 8px;
    }
    
    .content {
      padding: 20px; flex: 1; overflow-y: auto;
    }
    
    .quadrant {
      background: #f8f9f0; border: 3px solid #5C7849; border-radius: 20px;
      height: 260px; position: relative; margin: 20px 0;
    }
    
    .pin {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 52px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    
    .quad-label {
      position: absolute; font-size: 15px; font-weight: 700; color: #5C7849;
    }
    
    .tip-list h3 { color: #5C7849; margin: 25px 0 15px; }
    .tip-list ol { padding-left: 20px; line-height: 2; }
    
    .footer {
      background: #5C7849; color: white; padding: 20px; text-align: center;
      font-weight: bold; position: absolute; bottom: 0; width: 100%;
    }
  </style>
</head>
<body>
  <div class="app-screen">
    <!-- App 標題列 -->
    <div class="header">
      <div class="badge">🏆 關卡完成！</div>
      <h2>心滴・教練</h2>
      <p>你今天做得很好，讓我們一起規劃下一步</p>
    </div>

    <div class="content">
      <!-- 四象限 -->
      <div class="quadrant">
        <div class="quad-label" style="top:15px; left:20px;">舒適區</div>
        <div class="quad-label" style="top:15px; right:20px;">成長區</div>
        <div class="quad-label" style="bottom:15px; left:20px;">需要照顧區</div>
        <div class="quad-label" style="bottom:15px; right:20px;">挑戰區</div>
        <div class="pin">📍</div>
      </div>

      <div class="tip-list">
        <h3>教練行動建議</h3>
        <ol>
          <li><strong>延長創作時間</strong> 到 30 分鐘以上</li>
          <li>下次試試新色系，挑戰自己</li>
          <li>為這張作品取一個名字，留下紀念</li>
        </ol>
      </div>
    </div>

    <!-- 底部激勵 -->
    <div class="footer">
      🌱 下一關已解鎖！<br>
      一週內再記錄，就能看到完整情緒趨勢圖
    </div>
  </div>
</body>
</html>
