<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心滴・教練</title>
  <style>
    body { font-family: 'LXGW WenKai TC', system-ui; background: #f8f5f0; margin: 0; padding: 20px; }
    .coach-card {
      max-width: 420px; margin: 20px auto; background: white; border-radius: 24px;
      box-shadow: 0 10px 30px rgba(92,120,73,0.15); overflow: hidden; border: 3px solid #5C7849;
    }
    .header {
      background: linear-gradient(135deg, #5C7849, #8AA67A); color: white; padding: 20px; text-align: center;
    }
    .badge { background: #FFD700; color: #333; padding: 6px 16px; border-radius: 20px; font-size: 14px; display: inline-block; margin-bottom: 8px; }
    .quadrant { height: 220px; background: #f0f0e8; position: relative; margin: 20px; border-radius: 16px; border: 2px solid #5C7849; }
    /* 簡單四象限 + 定位點（可後續換 SVG） */
    .tip-list { padding: 0 20px 20px; }
    .next-level { background: #5C7849; color: white; padding: 16px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <div class="coach-card">
    <div class="header">
      <span class="badge">🏆 關卡完成！</span>
      <h2>心滴・教練</h2>
      <p>你今天做得很好，讓我們一起規劃下一步</p>
    </div>
    
    <div class="quadrant">
      <!-- 四象限簡單示意，可用 Canvas 或 SVG 替換更精美 -->
      <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:48px;">📍</div>
      <div style="position:absolute; top:20px; left:20px; color:#5C7849;">舒適區</div>
      <div style="position:absolute; top:20px; right:20px; color:#5C7849;">成長區</div>
      <div style="position:absolute; bottom:20px; left:20px;">需要照顧區</div>
      <div style="position:absolute; bottom:20px; right:20px;">挑戰區</div>
    </div>
    
    <div class="tip-list">
      <h3 style="color:#5C7849; padding:0 20px;">教練行動建議</h3>
      <ol style="padding:0 30px; line-height:1.8;">
        <li><strong>延長創作時間</strong> 到 30 分鐘以上</li>
        <li>下次試試新色系，挑戰自己</li>
        <li>為這張作品取一個名字，留下紀念</li>
      </ol>
    </div>
    
    <div class="next-level">
      🌱 下一關已解鎖！一週內再記錄，就能看到完整情緒趨勢圖
    </div>
  </div>
</body>
</html>
