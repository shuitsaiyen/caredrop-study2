<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareDrop Study 2 · 研究者後台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:#F5EFDF;color:#2A3520;padding:20px;line-height:1.6;}
.wrap{max-width:1200px;margin:0 auto;}
h1{font-family:'LXGW WenKai TC',serif;font-size:28px;margin-bottom:8px;color:#3D5230;}
.sub{color:#6B7558;font-size:14px;margin-bottom:24px;}

.login-box{max-width:400px;margin:80px auto;background:white;padding:32px;border-radius:18px;box-shadow:0 8px 24px rgba(60,80,40,0.12);}
.login-box h2{font-family:'LXGW WenKai TC',serif;margin-bottom:16px;color:#3D5230;}
.login-box input{width:100%;padding:14px;border:1.5px solid #EBE3CC;border-radius:10px;font-size:16px;margin-bottom:14px;}
.login-box input:focus{outline:none;border-color:#8AA67A;}
.login-box button{width:100%;background:#5C7849;color:white;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
.login-error{color:#B26B4A;font-size:13px;margin-top:8px;display:none;}

.dash{display:none;}
.dash.active{display:block;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
.card{background:white;padding:18px;border-radius:14px;box-shadow:0 2px 8px rgba(60,80,40,0.08);}
.card-label{font-size:12px;color:#6B7558;font-weight:600;letter-spacing:1px;}
.card-value{font-size:32px;font-weight:700;color:#3D5230;font-family:'LXGW WenKai TC',serif;margin-top:4px;}
.card-sub{font-size:12px;color:#8AA67A;margin-top:2px;}

.section{background:white;border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(60,80,40,0.08);}
.section h3{font-family:'LXGW WenKai TC',serif;margin-bottom:14px;color:#3D5230;font-size:18px;}

.cond-progress{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.cond-row{display:flex;align-items:center;gap:10px;padding:12px;background:#FBF6E9;border-radius:10px;}
.cond-name{font-weight:700;font-size:14px;width:60px;}
.cond-bar{flex:1;height:10px;background:#EBE3CC;border-radius:5px;overflow:hidden;}
.cond-fill{height:100%;background:#5C7849;}
.cond-num{font-size:13px;color:#6B7558;width:60px;text-align:right;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#FBF6E9;text-align:left;padding:10px;font-weight:700;color:#3D5230;border-bottom:2px solid #EBE3CC;}
td{padding:10px;border-bottom:1px solid #F5EFDF;}
tr:hover{background:#FBF6E9;cursor:pointer;}
.status-pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.status-completed{background:#D5E5C9;color:#3D5230;}
.status-progress{background:#F5DBB0;color:#7A5500;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.tb-btn{background:#5C7849;color:white;border:none;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.tb-btn-secondary{background:white;color:#3D5230;border:1.5px solid #8AA67A;}
.tb-btn:hover{opacity:.85;}

.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;color:#6B7558;}

select{padding:8px 12px;border:1.5px solid #EBE3CC;border-radius:8px;font-family:inherit;font-size:14px;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal.active{display:flex;}
.modal-card{background:white;border-radius:18px;padding:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-close{float:right;cursor:pointer;font-size:24px;color:#6B7558;background:none;border:none;}
.detail-grid{display:grid;grid-template-columns:120px 1fr;gap:8px;font-size:13px;margin-top:12px;}
.detail-grid > div:nth-child(odd){color:#6B7558;font-weight:600;}

.empty{text-align:center;padding:40px;color:#8AA67A;font-family:'LXGW WenKai TC',serif;}
</style>
</head>
<body>

<div class="wrap">

<!-- Login -->
<div id="login-screen" class="login-box">
  <h2>研究者後台</h2>
  <p style="color:#6B7558;font-size:13px;margin-bottom:18px;">CareDrop Study 2 · 監測與匯出</p>
  <input type="password" id="admin-pwd" placeholder="管理員密碼">
  <button onclick="adminLogin()">進入</button>
  <div class="login-error" id="login-err">密碼錯誤</div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dash">
  <h1>CareDrop Study 2</h1>
  <p class="sub">研究者後台 · 即時監測 · <span id="now-time"></span></p>

  <div class="refresh-bar">
    <span>每 10 秒自動更新 · 上次：<span id="last-refresh">—</span></span>
    <button class="tb-btn-secondary tb-btn" onclick="refreshAll()">立即更新</button>
  </div>

  <!-- Stats cards -->
  <div class="cards" id="stats-cards"></div>

  <!-- Condition progress -->
  <div class="section">
    <h3>各條件進度</h3>
    <div class="cond-progress" id="cond-progress"></div>
  </div>

  <!-- Toolbar -->
  <div class="section">
    <div class="toolbar">
      <button class="tb-btn" onclick="exportCSV('all')">匯出全部 CSV</button>
      <button class="tb-btn tb-btn-secondary" onclick="exportCSV('completed')">只匯出已完成</button>
      <select id="filter-cond" onchange="renderTable()">
        <option value="">全部條件</option>
        <option value="A1B1">A1B1（儀錶板）</option>
        <option value="A1B2">A1B2（鏡子）</option>
        <option value="A2B1">A2B1（教練）</option>
        <option value="A2B2">A2B2（夥伴）</option>
      </select>
      <select id="filter-status" onchange="renderTable()">
        <option value="">全部狀態</option>
        <option value="in_progress">進行中</option>
        <option value="completed">已完成</option>
      </select>
    </div>
  </div>

  <!-- Participant list -->
  <div class="section">
    <h3>受試者列表</h3>
    <div id="ptable-wrap"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal" id="modal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modal-title" style="font-family:'LXGW WenKai TC',serif;color:#3D5230;"></h2>
    <div id="modal-body"></div>
  </div>
</div>

</div>

<script>
const SUPABASE_URL = 'https://fhzvsjeheroindqhdkht.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoenZzamVoZXJvaW5kcWhka2h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDc5ODAsImV4cCI6MjA5MzYyMzk4MH0.TjQ-EX-qzFn4nx5AkXfSPfX9PlJl0Y3cDW4ZLIKqYog';
const ADMIN_PWD = 'caredrop2026';  // 你可以改成自己想要的密碼

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allParticipants = [];

const EMO_NAMES = {calm:'平靜',relaxed:'放鬆',tired:'疲累',worried:'擔心',sad:'難過'};
const REASON_NAMES = {economic:'經濟',relationship:'人際',health:'健康',learning:'學習',other:'其他'};

function adminLogin(){
  const pwd = document.getElementById('admin-pwd').value;
  if(pwd === ADMIN_PWD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    refreshAll();
    setInterval(refreshAll, 10000);
    setInterval(()=>{
      document.getElementById('now-time').textContent = new Date().toLocaleString('zh-TW');
    }, 1000);
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

async function refreshAll(){
  try{
    const {data, error} = await supabase
      .from('participants')
      .select('*')
      .order('created_at', {ascending: false});
    if(error) throw error;
    allParticipants = data || [];
    renderStats();
    renderConditionProgress();
    renderTable();
    document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('zh-TW');
  } catch(e){
    console.error('refresh error', e);
  }
}

function renderStats(){
  const total = allParticipants.length;
  const completed = allParticipants.filter(p=>p.status==='completed').length;
  const inProgress = allParticipants.filter(p=>p.status==='in_progress').length;
  const target = 80;
  
  document.getElementById('stats-cards').innerHTML = `
    <div class="card">
      <div class="card-label">總目標</div>
      <div class="card-value">${target}</div>
      <div class="card-sub">人</div>
    </div>
    <div class="card">
      <div class="card-label">已完成</div>
      <div class="card-value">${completed}</div>
      <div class="card-sub">${total>0?Math.round(completed/target*100):0}% 達成率</div>
    </div>
    <div class="card">
      <div class="card-label">進行中</div>
      <div class="card-value">${inProgress}</div>
      <div class="card-sub">受試者</div>
    </div>
    <div class="card">
      <div class="card-label">資料筆數</div>
      <div class="card-value">${total}</div>
      <div class="card-sub">含未完成</div>
    </div>
  `;
}

function renderConditionProgress(){
  const conditions = ['A1B1','A1B2','A2B1','A2B2'];
  const cellTarget = 20;
  
  document.getElementById('cond-progress').innerHTML = conditions.map(c=>{
    const completed = allParticipants.filter(p=>p.condition===c && p.status==='completed').length;
    const inProgress = allParticipants.filter(p=>p.condition===c && p.status==='in_progress').length;
    const pct = Math.min(100, completed/cellTarget*100);
    const total = completed + inProgress;
    return `
      <div class="cond-row">
        <span class="cond-name">${c}</span>
        <div class="cond-bar"><div class="cond-fill" style="width:${pct}%;"></div></div>
        <span class="cond-num">${completed}/${cellTarget}${inProgress>0?` (+${inProgress})`:''}</span>
      </div>
    `;
  }).join('');
}

function renderTable(){
  const condFilter = document.getElementById('filter-cond').value;
  const statusFilter = document.getElementById('filter-status').value;
  
  let filtered = allParticipants;
  if(condFilter) filtered = filtered.filter(p=>p.condition===condFilter);
  if(statusFilter) filtered = filtered.filter(p=>p.status===statusFilter);
  
  if(filtered.length === 0){
    document.getElementById('ptable-wrap').innerHTML = '<div class="empty">尚無資料</div>';
    return;
  }
  
  const html = `
    <table>
      <thead>
        <tr>
          <th>編號</th>
          <th>代號</th>
          <th>條件</th>
          <th>場次</th>
          <th>狀態</th>
          <th>T1 秒</th>
          <th>T2 秒</th>
          <th>T3 秒</th>
          <th>SUS</th>
          <th>進入時間</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(p=>`
          <tr onclick="showDetail('${p.id}')">
            <td><strong>${p.id}</strong></td>
            <td>${p.participant_code||'—'}</td>
            <td>${p.condition}</td>
            <td>${p.session_id}</td>
            <td><span class="status-pill status-${p.status==='completed'?'completed':'progress'}">${p.status==='completed'?'完成':'進行中'}</span></td>
            <td>${p.task1_duration_seconds||'—'}</td>
            <td>${p.task2_duration_seconds||'—'}</td>
            <td>${p.task3_duration_seconds||'—'}</td>
            <td>${p.sus_total!=null?p.sus_total:'—'}</td>
            <td>${new Date(p.created_at).toLocaleTimeString('zh-TW')}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('ptable-wrap').innerHTML = html;
}

function showDetail(id){
  const p = allParticipants.find(x=>x.id===id);
  if(!p) return;
  
  const lastEmo = (p.task1_emotions||[]).map(k=>EMO_NAMES[k]||k).join('、') || '—';
  const reasons = (p.task2b_reasons||[]).map(k=>REASON_NAMES[k]||k).join('、') || '—';
  const nowEmo = p.task2_current_emotion ? EMO_NAMES[p.task2_current_emotion] : '—';
  
  document.getElementById('modal-title').textContent = `${p.id} · ${p.participant_code||'—'}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-grid">
      <div>條件</div><div>${p.condition}</div>
      <div>場次</div><div>${p.session_id}</div>
      <div>狀態</div><div>${p.status}</div>
      <div>進入時間</div><div>${new Date(p.created_at).toLocaleString('zh-TW')}</div>
      <div>完成時間</div><div>${p.completed_at?new Date(p.completed_at).toLocaleString('zh-TW'):'—'}</div>
    </div>
    <h3 style="margin-top:20px;font-family:'LXGW WenKai TC',serif;color:#3D5230;">任務時間</h3>
    <div class="detail-grid">
      <div>T1 上週情緒</div><div>${p.task1_duration_seconds||'—'} 秒（選了：${lastEmo}）</div>
      <div>T2 舒壓+補充</div><div>${p.task2_duration_seconds||'—'} 秒</div>
      <div>　活動類別</div><div>${p.task2_activity_type||'—'}</div>
      <div>　活動描述</div><div>${p.task2_activity_text||'—'}</div>
      <div>　當前情緒</div><div>${nowEmo}</div>
      <div>　日記</div><div>${p.task2b_diary||'—'}</div>
      <div>　影響</div><div>${reasons}</div>
      <div>　困難</div><div>${p.task2b_difficulty!=null?p.task2b_difficulty+' / 7':'—'}</div>
      <div>T3 AI 卡</div><div>${p.task3_duration_seconds||'—'} 秒</div>
    </div>
    <h3 style="margin-top:20px;font-family:'LXGW WenKai TC',serif;color:#3D5230;">量表</h3>
    <div class="detail-grid">
      <div>SUS 總分</div><div>${p.sus_total!=null?p.sus_total+' / 100':'—'}</div>
      <div>SUS 各題</div><div>${(p.sus_responses||[]).join(', ')||'—'}</div>
      <div>UX 各題</div><div>${(p.ux_responses||[]).join(', ')||'—'}</div>
      <div>AI 接受度</div><div>${(p.ai_acceptance_responses||[]).join(', ')||'—'}</div>
    </div>
  `;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

function exportCSV(scope){
  let data = allParticipants;
  if(scope === 'completed') data = data.filter(p=>p.status==='completed');
  if(data.length === 0){ alert('沒有資料可匯出'); return; }
  
  const headers = ['編號','代號','條件','場次','狀態','進入時間','完成時間',
    'T1秒','T1上週情緒','T2秒','T2活動類別','T2活動描述','T2當前情緒',
    'T2b日記','T2b影響原因','T2b困難','T3秒',
    'SUS總分','SUS_Q1','SUS_Q2','SUS_Q3','SUS_Q4','SUS_Q5','SUS_Q6','SUS_Q7','SUS_Q8','SUS_Q9','SUS_Q10',
    'UX_Q1操作輕鬆','UX_Q2回顧便利','UX_Q3情緒對照','UX_Q4AI訊息',
    'AI_Q1符合度','AI_Q2溫度感','AI_Q3行動意願'];
  
  const rows = data.map(p=>{
    const sus = p.sus_responses || Array(10).fill('');
    const ux = p.ux_responses || Array(4).fill('');
    const ai = p.ai_acceptance_responses || Array(3).fill('');
    return [
      p.id, p.participant_code||'', p.condition, p.session_id, p.status,
      p.created_at||'', p.completed_at||'',
      p.task1_duration_seconds||'', (p.task1_emotions||[]).join('|'),
      p.task2_duration_seconds||'', p.task2_activity_type||'', p.task2_activity_text||'', p.task2_current_emotion||'',
      p.task2b_diary||'', (p.task2b_reasons||[]).join('|'), p.task2b_difficulty||'',
      p.task3_duration_seconds||'',
      p.sus_total!=null?p.sus_total:'',
      ...sus,
      ...ux,
      ...ai
    ];
  });
  
  const csv = [headers, ...rows].map(r=>r.map(v=>{
    const s = String(v||'');
    return s.includes(',')||s.includes('"')||s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `caredrop_study2_${scope}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Enter key for password
document.getElementById('admin-pwd').addEventListener('keypress', e=>{
  if(e.key === 'Enter') adminLogin();
});
</script>

</body>
</html>
