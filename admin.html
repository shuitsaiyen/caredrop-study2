<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareDrop 研究後台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=LXGW+WenKai+TC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:#F5EFDF;color:#2A3520;min-height:100vh;}
.container{max-width:1200px;margin:0 auto;padding:30px 20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding:20px;background:white;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);flex-wrap:wrap;gap:10px;}
.title{font-family:'LXGW WenKai TC';font-size:24px;font-weight:700;color:#3D5230;}
.subtitle{font-size:13px;color:#6B7558;margin-top:4px;}
.btn{padding:10px 18px;background:#5C7849;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-left:6px;}
.btn:hover{background:#3D5230;}
.btn-out{background:#A0A899;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;}
.stat-card{background:white;padding:18px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.stat-label{font-size:12px;color:#6B7558;letter-spacing:1px;font-weight:600;}
.stat-value{font-size:30px;font-weight:700;color:#3D5230;margin-top:6px;}
.stat-detail{font-size:12px;color:#6B7558;margin-top:4px;}
.section{background:white;padding:24px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:20px;}
.section-title{font-size:16px;font-weight:700;color:#3D5230;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.cond-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
.cond-card{background:#F5EFDF;border-radius:10px;padding:14px;}
.cond-name{font-size:13px;font-weight:700;color:#3D5230;}
.cond-desc{font-size:11px;color:#6B7558;margin-top:2px;}
.cond-bar{height:8px;background:#EBE3CC;border-radius:4px;margin-top:10px;overflow:hidden;}
.cond-fill{height:100%;background:#5C7849;transition:width 0.4s;}
.cond-text{font-size:13px;color:#3D5230;margin-top:8px;font-weight:600;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#F5EFDF;padding:10px;text-align:left;font-weight:700;color:#3D5230;border-bottom:2px solid #EBE3CC;font-size:12px;letter-spacing:1px;white-space:nowrap;}
td{padding:10px;border-bottom:1px solid #F5EFDF;white-space:nowrap;}
tr:hover{background:#FBF6E9;cursor:pointer;}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-pending{background:#FBE8DA;color:#B26B4A;}
.badge-progress{background:#FBF0C5;color:#A07020;}
.badge-completed{background:#DCEAD2;color:#3D5230;}
.badge-cond{background:#EBE3CC;color:#3D5230;}
.empty{text-align:center;padding:40px 20px;color:#6B7558;font-size:14px;}
.login{max-width:380px;margin:80px auto;background:white;padding:36px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,0.08);}
.login h2{font-family:'LXGW WenKai TC';font-size:24px;color:#3D5230;margin-bottom:8px;}
.login p{font-size:13px;color:#6B7558;margin-bottom:20px;}
.login input{width:100%;padding:14px;font-size:16px;border:1.5px solid #EBE3CC;border-radius:12px;margin-bottom:14px;}
.login input:focus{outline:none;border-color:#8AA67A;}
.login button{width:100%;padding:14px;background:#5C7849;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
.error{background:#FBE8DA;color:#B26B4A;padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-bg.active{display:flex;}
.modal{background:white;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:18px;font-weight:700;color:#3D5230;}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#6B7558;}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F5EFDF;font-size:14px;gap:10px;flex-wrap:wrap;}
.modal-row-l{color:#6B7558;font-weight:600;flex-shrink:0;}
.modal-row-v{color:#2A3520;text-align:right;word-break:break-word;}
.modal-photo{width:100%;border-radius:10px;margin:10px 0;}
.loader{text-align:center;padding:60px;color:#6B7558;}
.spin{display:inline-block;width:36px;height:36px;border:3px solid #EBE3CC;border-top-color:#5C7849;border-radius:50%;animation:s 0.8s linear infinite;}
@keyframes s{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- 登入頁 -->
<div id="login-screen" class="login">
  <h2>研究者後台</h2>
  <p>CareDrop Study 2 · 監測與匯出</p>
  <div id="login-error" class="error" style="display:none;"></div>
  <input type="password" id="pwd-input" placeholder="輸入密碼" autocomplete="off">
  <button onclick="checkLogin()">進入</button>
</div>

<!-- 主畫面 -->
<div id="main-screen" class="container" style="display:none;">

  <div class="header">
    <div>
      <div class="title">CareDrop Study 2 · 研究後台</div>
      <div class="subtitle" id="last-update">載入中...</div>
    </div>
    <div>
      <button class="btn" onclick="loadData()">重新整理</button>
      <button class="btn" onclick="exportCSV()">匯出 CSV</button>
      <button class="btn btn-out" onclick="logout()">登出</button>
    </div>
  </div>

  <div id="content">
    <div class="loader"><div class="spin"></div><div style="margin-top:14px;">載入受試者資料中...</div></div>
  </div>
</div>

<!-- 受試者詳細 modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-h">
      <div class="modal-title" id="modal-title">受試者詳細</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fhzvsjeheroindqhdkht.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoenZzamVoZXJvaW5kcWhka2h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDc5ODAsImV4cCI6MjA5MzYyMzk4MH0.TjQ-EX-qzFn4nx5AkXfSPfX9PlJl0Y3cDW4ZLIKqYog';
const ADMIN_PWD = 'vatqaz-mYcjyc-gojjo3';
const CONDITIONS = [
  {code:'A1B1', name:'儀錶板', desc:'反映式 × 客觀'},
  {code:'A1B2', name:'鏡子', desc:'反映式 × 陪伴'},
  {code:'A2B1', name:'教練', desc:'邀請式 × 客觀'},
  {code:'A2B2', name:'夥伴', desc:'邀請式 × 陪伴'},
];
const TARGET_PER_COND = 20;

async function sbFetch(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  return res.json();
}

let allParticipants = [];

function checkLogin(){
  const v = document.getElementById('pwd-input').value;
  const err = document.getElementById('login-error');
  if(v === ADMIN_PWD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    sessionStorage.setItem('cd_admin', '1');
    loadData();
  } else {
    err.textContent = '密碼錯誤，請重新輸入';
    err.style.display = 'block';
  }
}

document.getElementById('pwd-input').addEventListener('keypress', e => {
  if(e.key === 'Enter') checkLogin();
});

function logout(){
  sessionStorage.removeItem('cd_admin');
  location.reload();
}

if(sessionStorage.getItem('cd_admin') === '1'){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  loadData();
}

async function loadData(){
  document.getElementById('content').innerHTML = '<div class="loader"><div class="spin"></div><div style="margin-top:14px;">載入中...</div></div>';
  try{
    const data = await sbFetch('/participants?select=*&order=created_at.desc');
    allParticipants = data || [];
    renderAll();
    document.getElementById('last-update').textContent = '最後更新：' + new Date().toLocaleString('zh-TW');
  }catch(e){
    console.error(e);
    document.getElementById('content').innerHTML = `<div class="section"><div style="color:#B26B4A;">❌ 載入失敗：${e.message}</div></div>`;
  }
}

function renderAll(){
  const total = allParticipants.length;
  const completed = allParticipants.filter(p => p.status === 'completed').length;
  const inProgress = allParticipants.filter(p => p.status === 'in_progress').length;
  const photos = allParticipants.filter(p => p.task2_photo_url).length;

  let html = `
    <div class="stats">
      <div class="stat-card"><div class="stat-label">總受試者</div><div class="stat-value">${total}</div><div class="stat-detail">目標 80 人</div></div>
      <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value">${completed}</div><div class="stat-detail">${total > 0 ? Math.round(completed/total*100) : 0}%</div></div>
      <div class="stat-card"><div class="stat-label">進行中</div><div class="stat-value">${inProgress}</div></div>
      <div class="stat-card"><div class="stat-label">含照片</div><div class="stat-value">${photos}</div></div>
    </div>
    
    <div class="section">
      <div class="section-title">各條件進度</div>
      <div class="cond-grid">
  `;
  
  CONDITIONS.forEach(c => {
    const list = allParticipants.filter(p => p.condition === c.code && p.status === 'completed');
    const pct = Math.min(100, Math.round(list.length/TARGET_PER_COND*100));
    html += `
      <div class="cond-card">
        <div class="cond-name">${c.code} · ${c.name}</div>
        <div class="cond-desc">${c.desc}</div>
        <div class="cond-bar"><div class="cond-fill" style="width:${pct}%"></div></div>
        <div class="cond-text">${list.length} / ${TARGET_PER_COND} 完成</div>
      </div>`;
  });
  
  html += `</div></div>`;
  
  // 受試者列表
  html += `<div class="section">
    <div class="section-title">受試者列表（點任一行查看詳細）</div>
    <div class="table-wrap">`;
  
  if(total === 0){
    html += `<div class="empty">尚無受試者資料</div>`;
  } else {
    html += `<table>
      <thead><tr>
        <th>編號</th><th>條件</th><th>場次</th><th>狀態</th>
        <th>任務 1 秒</th><th>任務 2 秒</th><th>任務 3 秒</th>
        <th>困難</th><th>照片</th><th>建立時間</th>
      </tr></thead><tbody>`;
    
    allParticipants.forEach(p => {
      const status = p.status === 'completed' 
        ? '<span class="badge badge-completed">完成</span>'
        : p.status === 'in_progress' 
          ? '<span class="badge badge-progress">進行中</span>'
          : '<span class="badge badge-pending">待處理</span>';
      const time = p.created_at ? new Date(p.created_at).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
      html += `<tr onclick="showDetail('${p.id}')">
        <td><strong>${p.id ? p.id.substring(0,12) : '-'}</strong></td>
        <td><span class="badge badge-cond">${p.condition || '-'}</span></td>
        <td>${p.session_id || '-'}</td>
        <td>${status}</td>
        <td>${p.task1_duration_seconds || '-'}</td>
        <td>${p.task2_duration_seconds || '-'}</td>
        <td>${p.task3_duration_seconds || '-'}</td>
        <td>${p.task2b_difficulty || '-'}</td>
        <td>${p.task2_photo_url ? '📷' : '-'}</td>
        <td>${time}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  
  html += `</div></div>`;
  document.getElementById('content').innerHTML = html;
}

function showDetail(id){
  const p = allParticipants.find(x => x.id === id);
  if(!p) return;
  
  const emoNames = {calm:'平靜',relaxed:'放鬆',tired:'疲累',worried:'擔心',sad:'難過'};
  const reasonNames = {economic:'經濟狀況',relationship:'人際關係',health:'健康狀況',learning:'學習狀況',other:'其他'};
  const lastWeek = (p.task1_emotions || []).map(k => emoNames[k] || k).join('、') || '-';
  const reasons = (p.task2b_reasons || []).map(k => reasonNames[k] || k).join('、') || '-';
  const activity = p.task2_activity_type === 'creation' ? '創作紀錄' : p.task2_activity_type === 'behavior' ? '行為紀錄' : '-';
  
  document.getElementById('modal-title').textContent = `受試者：${p.id}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-row"><span class="modal-row-l">條件</span><span class="modal-row-v">${p.condition || '-'}</span></div>
    <div class="modal-row"><span class="modal-row-l">場次</span><span class="modal-row-v">${p.session_id || '-'}</span></div>
    <div class="modal-row"><span class="modal-row-l">狀態</span><span class="modal-row-v">${p.status || '-'}</span></div>
    <div class="modal-row"><span class="modal-row-l">建立時間</span><span class="modal-row-v">${p.created_at ? new Date(p.created_at).toLocaleString('zh-TW') : '-'}</span></div>
    <div class="modal-row"><span class="modal-row-l">完成時間</span><span class="modal-row-v">${p.completed_at ? new Date(p.completed_at).toLocaleString('zh-TW') : '-'}</span></div>
    <hr style="margin:12px 0;border:none;border-top:1px solid #F5EFDF;">
    <div class="modal-row"><span class="modal-row-l">任務 1 上週情緒</span><span class="modal-row-v">${lastWeek}</span></div>
    <div class="modal-row"><span class="modal-row-l">任務 1 用時</span><span class="modal-row-v">${p.task1_duration_seconds || '-'} 秒</span></div>
    <hr style="margin:12px 0;border:none;border-top:1px solid #F5EFDF;">
    <div class="modal-row"><span class="modal-row-l">任務 2 類別</span><span class="modal-row-v">${activity}</span></div>
    <div class="modal-row"><span class="modal-row-l">任務 2 內容</span><span class="modal-row-v">${p.task2_activity_text || '-'}</span></div>
    <div class="modal-row"><span class="modal-row-l">當前情緒</span><span class="modal-row-v">${emoNames[p.task2_current_emotion] || '-'}</span></div>
    ${p.task2_photo_url ? `<img class="modal-photo" src="${p.task2_photo_url}">` : ''}
    <div class="modal-row"><span class="modal-row-l">日記備註</span><span class="modal-row-v">${p.task2b_diary || '-'}</span></div>
    <div class="modal-row"><span class="modal-row-l">影響原因</span><span class="modal-row-v">${reasons}</span></div>
    <div class="modal-row"><span class="modal-row-l">困難指數</span><span class="modal-row-v">${p.task2b_difficulty || '-'} / 7</span></div>
    <div class="modal-row"><span class="modal-row-l">任務 2 用時</span><span class="modal-row-v">${p.task2_duration_seconds || '-'} 秒</span></div>
    <hr style="margin:12px 0;border:none;border-top:1px solid #F5EFDF;">
    <div class="modal-row"><span class="modal-row-l">任務 3 用時</span><span class="modal-row-v">${p.task3_duration_seconds || '-'} 秒</span></div>
  `;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

function exportCSV(){
  if(allParticipants.length === 0){alert('尚無資料可匯出');return;}
  const headers = ['id','condition','session_id','status','task1_emotions','task1_duration_seconds','task2_activity_type','task2_activity_text','task2_current_emotion','task2b_diary','task2b_reasons','task2b_difficulty','task2_duration_seconds','task3_duration_seconds','has_photo','created_at','completed_at'];
  const rows = [headers.join(',')];
  allParticipants.forEach(p => {
    const row = headers.map(h => {
      let v = p[h];
      if(h === 'has_photo') v = p.task2_photo_url ? 'yes' : 'no';
      if(Array.isArray(v)) v = v.join('|');
      if(v === null || v === undefined) v = '';
      v = String(v).replace(/"/g, '""');
      return `"${v}"`;
    });
    rows.push(row.join(','));
  });
  const csv = rows.join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `caredrop_export_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
